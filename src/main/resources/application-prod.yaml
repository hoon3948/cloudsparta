spring:
  config:
    import: aws-parameterstore:/cloud-health-app/prod/

  cloud:
    aws:
      s3:
        bucket: cloud-health-taehoon-files
      region:
        static: ap-northeast-2
#      credentials:
#        access-key: ${AWS_ACCESS_KEY_ID}
#        secret-key: ${AWS_SECRET_ACCESS_KEY}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
#    hibernate:
#      ddl-auto: validate

management:
  endpoint:
    health:
      show-details: never

  endpoints:
    web:
      exposure:
        include: health,info

  info:
    env:
      enabled: true

info:
  app:
    message: ${APP_MESSAGE}

logging:
  level:
    root: INFO